name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true

      - name: Run tests
        run: pixi run -e sccircuits test

      - name: Lint
        run: pixi run -e sccircuits lint

      - name: Typecheck
        run: pixi run -e sccircuits typecheck

      - name: Build docs
        run: pixi run -e sccircuits docs-build

  package:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build and check package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: sccircuits-dist
          path: dist/

  publish:
    name: Publish package
    needs: [verify, package]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sccircuits/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: sccircuits-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
