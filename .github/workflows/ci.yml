name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests and docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true

      - name: Run tests
        run: pixi run -e sccircuits test

      - name: Lint
        run: pixi run -e sccircuits lint

      - name: Typecheck
        run: pixi run -e sccircuits typecheck

      - name: Build docs
        run: pixi run -e sccircuits docs-build

  pip-smoke:
    name: Pip smoke (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Check installed dependencies
        run: python -m pip check

      - name: Run installed-package smoke test
        run: python "${{ github.workspace }}/tests/pip_smoke.py"
        working-directory: ${{ runner.temp }}

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build and check package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
