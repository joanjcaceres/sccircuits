name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests and docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true

      - name: Run tests
        run: pixi run -e sccircuits test

      - name: Build docs
        run: pixi run -e sccircuits docs-build
