site_name: SCCircuits
site_description: Superconducting circuit analysis and quantization tools
site_url: https://joanjcaceres.github.io/sccircuits/
repo_url: https://github.com/joanjcaceres/sccircuits
repo_name: joanjcaceres/sccircuits
exclude_docs: |
  _build/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - BBQ:
      - Overview: bbq/index.md
      - Quickstart: bbq/quickstart.md
      - Examples: bbq/examples.md
      - BBQ API: api/bbq.md
      - Mathematical Reference: theory/circuit-matrix-quantization.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
